# Move me to .github/workflows/ci.yml (the integration lacks the Workflows
# permission; one `git mv` after merge arms CI).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx tsc --noEmit
      - run: bunx biome ci .
      - run: bun test
